# lefthook 設定。
# インストール: lefthook install
# 単純なフックは run に直書きし、固有ロジックのあるものだけ scripts/ に切り出す。

commit-msg:
  commands:
    conventional-commits:
      # {1} には commit-msg フックに渡される引数（コミットメッセージファイルのパス）が入る。
      run: bash scripts/commit-msg.sh {1}

# pre-commit で format / build / lint を順に走らせる。
# ディレクトリ抽出など固有ロジックのある build だけ scripts/ に切り出す。
pre-commit:
  parallel: false
  commands:
    format:
      # 差分の C++ ファイルを clang-format で整形し、整形結果を再 stage する。
      glob: "*.{cpp,hpp,tpp,h}"
      run: clang-format -i {staged_files}
      stage_fixed: true
    build:
      # 差分のあった cppNN/exNN/ を 42 の採点フラグでビルドして弾く。
      glob: "cpp*/ex*/*.{cpp,hpp,tpp,h}"
      run: bash scripts/check-build.sh {staged_files}
    lint:
      # cppcheck でコンパイラ（-Wall -Wextra）が見逃すバグ（メモリリーク・
      # 未初期化メンバ・delete/delete[] の取り違え等）を検出して弾く。
      glob: "cpp*/**/*.cpp"
      run: cppcheck --std=c++98 --enable=warning,performance,portability --inline-suppr --error-exitcode=1 --quiet {staged_files}
